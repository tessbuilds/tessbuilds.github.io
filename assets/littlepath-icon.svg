<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7FE8"/>
      <stop offset="100%" stop-color="#5B72D4"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2EC896"/>
      <stop offset="100%" stop-color="#1A8F66"/>
    </linearGradient>
    <linearGradient id="leafhi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background — no rounded corners, Apple applies the mask -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft inner glow at top -->
  <ellipse cx="512" cy="168" rx="400" ry="228" fill="white" opacity="0.06"/>

  <!-- Leaf body — wide organic teardrop -->
  <path d="M512 776
           C512 776 271 634 263 420
           C255 248 362 158 512 158
           C662 158 769 248 761 420
           C753 634 512 776 512 776Z"
        fill="url(#leaf)"/>

  <!-- Leaf highlight -->
  <path d="M512 776
           C512 776 271 634 263 420
           C255 248 362 158 512 158
           C662 158 769 248 761 420
           C753 634 512 776 512 776Z"
        fill="url(#leafhi)"/>

  <!-- Central vein -->
  <path d="M512 742 C512 598 512 386 512 204"
        stroke="white" stroke-width="8" fill="none"
        stroke-linecap="round" opacity="0.18"/>

  <!-- Child circle — white, the focal point of the mark -->
  <circle cx="512" cy="282" r="92" fill="white" opacity="0.96"/>

  <!-- Soft purple accent inside circle -->
  <circle cx="512" cy="282" r="40" fill="#7F77DD" opacity="0.22"/>

  <!-- Stem -->
  <path d="M512 776 C512 822 504 856 494 884"
        stroke="white" stroke-width="16"
        fill="none" stroke-linecap="round" opacity="0.28"/>

  <!-- Three ground dots — the path motif -->
  <circle cx="412" cy="904" r="22" fill="white" opacity="0.22"/>
  <circle cx="504" cy="920" r="28" fill="white" opacity="0.35"/>
  <circle cx="596" cy="904" r="22" fill="white" opacity="0.22"/>

</svg>
